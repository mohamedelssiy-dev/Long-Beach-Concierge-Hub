<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Long Beach Concierge</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --navy:#0A2240;
    --gold:#C5A059;
    --light:#F4F7F6;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:var(--light);
}

header{
    background:var(--navy);
    padding:15px;
    text-align:center;
    border-bottom:3px solid var(--gold);
}

.logo{
    color:var(--gold);
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
}

.subtitle{
    color:white;
    font-size:13px;
}

.language-bar{
    margin-top:12px;
}

.language-bar button{
    background:var(--gold);
    border:none;
    padding:8px 14px;
    margin:3px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.hero{
    height:250px;
    background:url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1200')
    center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-content{
    background:rgba(10,34,64,.75);
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.hero-content h1{
    color:white;
}

.hero-content p{
    color:#ddd;
    margin-top:10px;
}

.quick-grid{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    border-top:4px solid var(--gold);
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card i{
    font-size:32px;
    color:var(--gold);
    margin-bottom:10px;
}

.card h3{
    color:var(--navy);
}

footer{
    margin-top:40px;
    background:var(--navy);
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>
<body>

<header>

<div class="logo">
LONG BEACH<br>
CONCIERGE
</div>

<div class="subtitle">
Your Digital Resort Assistant
</div>

<div class="language-bar">
<button>🇪🇬 العربية</button>
<button>🇬🇧 English</button>
<button>🇩🇪 Deutsch</button>
<button>🇷🇺 Русский</button>
</div>

</header>

<section class="hero">

<div class="hero-content">
<h1>Welcome to Long Beach Resort Hurghada</h1>
<p>Luxury Digital Concierge Experience</p>
</div>

</section>

<section class="quick-grid">

<div class="card">
<i class="fa-solid fa-robot"></i>
<h3>Concierge</h3>
</div>

<div class="card">
<i class="fa-solid fa-utensils"></i>
<h3>Restaurants</h3>
</div>

<div class="card">
<i class="fa-solid fa-martini-glass"></i>
<h3>Bars</h3>
</div>

<div class="card">
<i class="fa-solid fa-champagne-glasses"></i>
<h3>Events</h3>
</div>

<div class="card">
<i class="fa-solid fa-bell-concierge"></i>
<h3>Room Service</h3>
</div>

</section>

<footer>
Long Beach Concierge © 2026
</footer>

</body>
</html>
