<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Long Beach Concierge</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header class="main-header">

    <div class="logo">

        <h1>LONG BEACH</h1>
        <h2>CONCIERGE</h2>

    </div>

    <div class="language-switcher">

        <button onclick="changeLanguage('ar')">🇪🇬</button>
        <button onclick="changeLanguage('en')">🇬🇧</button>
        <button onclick="changeLanguage('de')">🇩🇪</button>
        <button onclick="changeLanguage('ru')">🇷🇺</button>

    </div>

</header>

<main id="app">

    <section class="hero">

        <h1>Welcome to Long Beach Resort Hurghada</h1>

        <p>Your Digital Concierge Experience</p>

    </section>

    <section class="quick-access">

        <div class="feature-card">
            <i class="fa-solid fa-robot"></i>
            <h3>Concierge</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-utensils"></i>
            <h3>Restaurants</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-martini-glass"></i>
            <h3>Bars</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-champagne-glasses"></i>
            <h3>Events</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-bell-concierge"></i>
            <h3>Room Service</h3>
        </div>

    </section>

</main>

<script src="js/language.js"></script>
<script src="js/concierge.js"></script>
<script src="js/app.js"></script>

</body>
</html>
